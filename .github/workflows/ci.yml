name: CI

on:
  push:
  pull_request:

jobs:
  chisel-test:
    name: Chisel tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Run tests
        run: sbt test
